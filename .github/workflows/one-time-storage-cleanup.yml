name: One-Time Storage Cleanup

# Manual trigger only - run once then delete this file
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Cleanup orphan storage files
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const SUPABASE_URL = process.env.SUPABASE_URL;
            const SUPABASE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY;
            
            if (!SUPABASE_URL || !SUPABASE_KEY) {
              console.log('❌ Missing Supabase credentials');
              return;
            }
            
            const headers = {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json'
            };
            
            // Cutoff: March 1, 2026 00:00:00 UTC (timestamp in milliseconds)
            // Files with timestamp < this will be deleted
            const cutoffTimestamp = new Date('2026-03-01T00:00:00Z').getTime();
            console.log(`📅 Cutoff timestamp: ${cutoffTimestamp} (March 1, 2026)`);
            
            // List all files in punch-photos/punches folder
            const listUrl = `${SUPABASE_URL}/storage/v1/object/list/punch-photos`;
            
            console.log(`🔍 Listing files in storage...`);
            
            const listResponse = await fetch(listUrl, {
              method: 'POST',
              headers,
              body: JSON.stringify({
                prefix: 'punches/',
                limit: 1000
              })
            });
            
            if (!listResponse.ok) {
              const errorText = await listResponse.text();
              console.log(`❌ List failed: ${listResponse.status} - ${errorText}`);
              return;
            }
            
            const files = await listResponse.json();
            console.log(`📁 Found ${files.length} files in storage`);
            
            if (files.length === 0) {
              console.log('✅ No files in storage');
              return;
            }
            
            // Filter files older than cutoff based on filename timestamp
            const filesToDelete = [];
            const filesToKeep = [];
            
            for (const file of files) {
              // Skip folders
              if (file.id === null) continue;
              
              const fileName = file.name; // e.g., "L10_1772096681670.jpg"
              
              // Extract timestamp from filename
              const match = fileName.match(/_(\d+)\.jpg$/);
              
              if (match) {
                const fileTimestamp = parseInt(match[1], 10);
                
                if (fileTimestamp < cutoffTimestamp) {
                  filesToDelete.push(`punches/${fileName}`);
                  console.log(`🗑️ To delete: ${fileName} (${new Date(fileTimestamp).toISOString()})`);
                } else {
                  filesToKeep.push(fileName);
                }
              } else {
                console.log(`⚠️ Could not parse timestamp from: ${fileName}`);
              }
            }
            
            console.log(`\n📊 Analysis:`);
            console.log(`   🗑️ Files to delete: ${filesToDelete.length}`);
            console.log(`   ✅ Files to keep: ${filesToKeep.length}`);
            
            if (filesToDelete.length === 0) {
              console.log('✅ No old files to delete');
              return;
            }
            
            // Delete files in batches of 100
            let deletedCount = 0;
            let errorCount = 0;
            const batchSize = 100;
            
            for (let i = 0; i < filesToDelete.length; i += batchSize) {
              const batch = filesToDelete.slice(i, i + batchSize);
              
              const deleteUrl = `${SUPABASE_URL}/storage/v1/object/punch-photos`;
              const deleteResponse = await fetch(deleteUrl, {
                method: 'DELETE',
                headers,
                body: JSON.stringify({ prefixes: batch })
              });
              
              if (deleteResponse.ok) {
                deletedCount += batch.length;
                console.log(`✅ Batch deleted: ${batch.length} files`);
              } else {
                const errorText = await deleteResponse.text();
                console.log(`❌ Batch delete failed: ${deleteResponse.status} - ${errorText}`);
                errorCount += batch.length;
              }
            }
            
            console.log(`\n📊 Final Summary:`);
            console.log(`   ✅ Deleted: ${deletedCount}`);
            console.log(`   ❌ Errors: ${errorCount}`);
            console.log(`   📁 Kept (March+): ${filesToKeep.length}`);
