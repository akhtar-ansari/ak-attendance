name: Photo Cleanup

# Run daily at 2:00 AM Riyadh time (UTC+3 = 23:00 UTC previous day)
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Cleanup old punch photos
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const SUPABASE_URL = process.env.SUPABASE_URL;
            const SUPABASE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY;
            
            if (!SUPABASE_URL || !SUPABASE_KEY) {
              console.log('❌ Missing Supabase credentials');
              return;
            }
            
            const headers = {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json'
            };
            
            // Calculate cutoff date (15 days ago)
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - 15);
            const cutoffDateStr = cutoffDate.toISOString().split('T')[0];
            
            // Calculate month closure (1st of current month)
            // Photos from previous months are eligible for deletion
            const today = new Date();
            const firstOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
            const monthClosureStr = firstOfMonth.toISOString().split('T')[0];
            
            console.log(`📅 Cutoff date (15 days ago): ${cutoffDateStr}`);
            console.log(`📅 Month closure date: ${monthClosureStr}`);
            console.log(`📅 Will delete photos from dates < ${cutoffDateStr} AND < ${monthClosureStr}`);
            
            // The effective cutoff is the earlier of the two dates
            const effectiveCutoff = cutoffDateStr > monthClosureStr ? monthClosureStr : cutoffDateStr;
            console.log(`📅 Effective cutoff: ${effectiveCutoff}`);
            
            // Query punch_records with photo_url, older than cutoff
            const queryUrl = `${SUPABASE_URL}/rest/v1/punch_records?photo_url=not.is.null&date=lt.${effectiveCutoff}&select=id,photo_url,date,labor_id`;
            
            console.log(`🔍 Querying for old photos...`);
            
            const response = await fetch(queryUrl, { headers });
            
            if (!response.ok) {
              console.log(`❌ Query failed: ${response.status} ${response.statusText}`);
              return;
            }
            
            const records = await response.json();
            console.log(`📸 Found ${records.length} photos to delete`);
            
            if (records.length === 0) {
              console.log('✅ No photos to cleanup');
              return;
            }
            
            // Extract file paths from URLs
            const filePaths = [];
            const recordMap = new Map();
            
            for (const record of records) {
              try {
                const url = new URL(record.photo_url);
                const pathMatch = url.pathname.match(/\/storage\/v1\/object\/public\/punch-photos\/(.+)/);
                
                if (pathMatch) {
                  const filePath = pathMatch[1];
                  filePaths.push(filePath);
                  recordMap.set(filePath, record);
                } else {
                  console.log(`⚠️ Could not parse path from: ${record.photo_url}`);
                }
              } catch (error) {
                console.log(`⚠️ Invalid URL: ${record.photo_url}`);
              }
            }
            
            console.log(`📁 Extracted ${filePaths.length} file paths`);
            
            // Delete files from storage in batches of 100
            let storageDeletedCount = 0;
            let storageErrorCount = 0;
            const batchSize = 100;
            
            for (let i = 0; i < filePaths.length; i += batchSize) {
              const batch = filePaths.slice(i, i + batchSize);
              
              const deleteUrl = `${SUPABASE_URL}/storage/v1/object/punch-photos`;
              const deleteResponse = await fetch(deleteUrl, {
                method: 'DELETE',
                headers,
                body: JSON.stringify({ prefixes: batch })
              });
              
              if (deleteResponse.ok) {
                const result = await deleteResponse.json();
                storageDeletedCount += batch.length;
                console.log(`✅ Storage batch deleted: ${batch.length} files`);
              } else {
                const errorText = await deleteResponse.text();
                console.log(`⚠️ Storage batch delete failed: ${deleteResponse.status} - ${errorText}`);
                storageErrorCount += batch.length;
              }
            }
            
            // Update database records - set photo_url to NULL
            let dbUpdatedCount = 0;
            let dbErrorCount = 0;
            
            const recordIds = records.map(r => r.id);
            
            // Update in batches of 100
            for (let i = 0; i < recordIds.length; i += batchSize) {
              const batch = recordIds.slice(i, i + batchSize);
              const idsParam = batch.map(id => `"${id}"`).join(',');
              
              const updateUrl = `${SUPABASE_URL}/rest/v1/punch_records?id=in.(${idsParam})`;
              const updateResponse = await fetch(updateUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({ photo_url: null })
              });
              
              if (updateResponse.ok) {
                dbUpdatedCount += batch.length;
                console.log(`✅ Database batch updated: ${batch.length} records`);
              } else {
                const errorText = await updateResponse.text();
                console.log(`❌ Database batch update failed: ${updateResponse.status} - ${errorText}`);
                dbErrorCount += batch.length;
              }
            }
            
            console.log(`\n📊 Summary:`);
            console.log(`   📁 Storage deleted: ${storageDeletedCount}`);
            console.log(`   📁 Storage errors: ${storageErrorCount}`);
            console.log(`   🗄️ Database updated: ${dbUpdatedCount}`);
            console.log(`   🗄️ Database errors: ${dbErrorCount}`);
            console.log(`   📸 Total processed: ${records.length}`);
