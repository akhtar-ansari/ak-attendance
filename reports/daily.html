<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Attendance - Daily Report</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .filters-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .summary-card .value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .summary-card .label {
            font-size: 12px;
            color: #666;
        }
        .status-P { color: #22543d; background: #c6f6d5; }
        .status-H { color: #975a16; background: #fefcbf; }
        .status-A { color: #c53030; background: #fed7d7; }
        .photo-btn {
            background: #4299e1;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .photo-btn:hover {
            background: #3182ce;
        }
        
        /* LOP Styles */
        .lop-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .lop-checkbox:disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }
        .approve-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .approve-btn:hover {
            background: #38a169;
        }
        .approve-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        .undo-btn {
            background: #ed8936;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .undo-btn:hover {
            background: #dd6b20;
        }
        .reason-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 2px 5px;
        }
        .reason-btn:hover {
            background: #e2e8f0;
            border-radius: 4px;
        }
        .approved-info {
            font-size: 11px;
            color: #38a169;
            margin-top: 3px;
        }
        .lop-inline {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
        }
        .bulk-actions {
            display: none;
            background: #667eea;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            align-items: center;
            gap: 15px;
        }
        .bulk-actions.active {
            display: flex;
        }
        .bulk-actions .count {
            font-weight: bold;
        }
        .bulk-actions button {
            background: white;
            color: #667eea;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        .bulk-actions button:hover {
            background: #f0f0f0;
        }
        .bulk-actions .clear-btn {
            background: transparent;
            color: white;
            border: 1px solid white;
        }
        .frozen-badge {
            background: #e2e8f0;
            color: #718096;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Daily Attendance Report</h1>
            <div class="header-actions">
                <button type="button" class="btn btn-secondary" onclick="location.href='../dashboard.html'">← Dashboard</button>
            </div>
        </div>

        <div class="content">
            <!-- Filters -->
            <div class="filters-card">
                <div class="form-grid">
                    <div class="form-group">
                        <label>From Date</label>
                        <input type="date" id="fromDate" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>To Date</label>
                        <input type="date" id="toDate" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <select id="departmentFilter" class="form-control">
                            <option value="">All Departments</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Search by Labor ID or Iqama</label>
                        <input type="text" id="laborFilter" class="form-control" placeholder="Leave empty for all laborers">
                    </div>
                    <div class="form-group">
                        <label>LOP Status</label>
                        <select id="lopFilter" class="form-control">
                            <option value="">All Records</option>
                            <option value="pending">Pending Approval</option>
                            <option value="approved">Approved</option>
                        </select>
                    </div>
                </div>
                <div class="action-buttons" style="margin-top: 15px;">
                    <button type="button" class="btn btn-primary" onclick="generateReport()">📊 Generate Report</button>
                    <button type="button" class="btn btn-success" onclick="exportCSV()">📥 Export CSV</button>
                </div>
            </div>

            <!-- Summary -->
            <div class="summary-grid" id="summarySection" style="display: none;">
                <div class="summary-card">
                    <div class="value" id="totalRecords" style="color: #667eea;">0</div>
                    <div class="label">Total Records</div>
                </div>
                <div class="summary-card">
                    <div class="value" id="presentCount" style="color: #48bb78;">0</div>
                    <div class="label">Present</div>
                </div>
                <div class="summary-card">
                    <div class="value" id="halfDayCount" style="color: #ed8936;">0</div>
                    <div class="label">Half Day</div>
                </div>
                <div class="summary-card">
                    <div class="value" id="absentCount" style="color: #e53e3e;">0</div>
                    <div class="label">Absent</div>
                </div>
                <div class="summary-card">
                    <div class="value" id="avgHours" style="color: #4299e1;">0</div>
                    <div class="label">Avg Hours</div>
                </div>
            </div>

            <!-- Bulk Actions Bar -->
            <div class="bulk-actions" id="bulkActions">
                <span><span class="count" id="selectedCount">0</span> selected</span>
                <button type="button" onclick="openBulkApproveModal()">✓ Approve Selected</button>
                <button type="button" class="clear-btn" onclick="clearSelection()">Clear</button>
            </div>

            <!-- Report Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40px;">
                                <input type="checkbox" id="selectAll" class="lop-checkbox" onchange="toggleSelectAll()" title="Select All">
                            </th>
                            <th>Date</th>
                            <th>Labor ID</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Login</th>
                            <th>Logout</th>
                            <th>Hours</th>
                            <th>Auto</th>
                            <th>Final</th>
                            <th>LOP Action</th>
                            <th>Photos</th>
                        </tr>
                    </thead>
                    <tbody id="reportTable">
                        <tr>
                            <td colspan="12" class="text-center p-20 text-muted">
                                Select date range and click "Generate Report"
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Photo Modal -->
    <div class="modal-overlay" id="photoModal">
        <div class="modal" style="max-width: 700px;">
            <div class="modal-header">
                <h2 id="photoModalTitle">Punch Photos</h2>
                <button type="button" class="modal-close" onclick="closePhotoModal()">&times;</button>
            </div>
            <div class="modal-body" id="photoModalBody">
                <!-- Photos will be loaded here -->
            </div>
        </div>
    </div>

    <!-- LOP Approve Modal -->
    <div class="modal-overlay" id="approveModal">
        <div class="modal" style="max-width: 500px;">
            <div class="modal-header">
                <h2 id="approveModalTitle">Approve LOP</h2>
                <button type="button" class="modal-close" onclick="closeApproveModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="approveInfo" style="background: #f7fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px;"></div>
                <div class="form-group">
                    <label>Reason / Remarks <span style="color: red;">*</span></label>
                    <textarea id="approveReason" class="form-control" rows="3" placeholder="Enter reason for LOP approval (mandatory)"></textarea>
                </div>
                <div class="action-buttons" style="margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="closeApproveModal()">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="confirmApprove()">✓ Approve</button>
                </div>
            </div>
        </div>
    </div>

    <!-- LOP Reason View Modal -->
    <div class="modal-overlay" id="reasonModal">
        <div class="modal" style="max-width: 450px;">
            <div class="modal-header">
                <h2>LOP Details</h2>
                <button type="button" class="modal-close" onclick="closeReasonModal()">&times;</button>
            </div>
            <div class="modal-body" id="reasonModalBody">
                <!-- Reason details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- App Scripts -->
    <script src="../js/config/supabase.js"></script>
    <script src="../js/auth/auth.js"></script>
    <script src="../js/utils/date-utils.js"></script>
    <script src="../js/utils/csv-handler.js"></script>
    <script src="../js/ui/sync-indicator.js"></script>
    <script src="../js/ui/toast.js"></script>
    <script src="../js/api/department-api.js"></script>
    <script src="../js/api/labor-api.js"></script>
    <script src="../js/api/report-api.js"></script>

    <script>
        // Require login
        if (!AUTH.requireLogin()) {
            window.location.href = '../index.html';
        }

        const session = AUTH.getSession();
        const isAdmin = session.role === 'super_admin' || session.role === 'admin';
        
        let departments = [];
        let laborers = [];
        let reportData = [];
        let selectedIds = new Set();
        let pendingApproveId = null;
        let pendingBulkApprove = false;

        // Set default dates
        function setDefaultDates() {
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            
            document.getElementById('fromDate').value = DateUtils.formatForInput(firstDay);
            document.getElementById('toDate').value = DateUtils.formatForInput(today);
        }

        // Load filter options
        async function loadFilters() {
            try {
                SyncIndicator.show('Loading...');

                // Load departments
                const deptResult = await DepartmentAPI.getActive();
                if (deptResult.success) {
                    departments = deptResult.data;
                    const deptSelect = document.getElementById('departmentFilter');
                    deptSelect.innerHTML = '<option value="">All Departments</option>';
                    
                    departments.forEach(dept => {
                        if (session.role === 'super_admin' || dept.id === session.departmentId) {
                            deptSelect.innerHTML += `<option value="${dept.id}">${dept.name}</option>`;
                        }
                    });
                }

                // Load laborers
                const laborResult = await LaborAPI.getAll();
                if (laborResult.success) {
                    laborers = laborResult.data;
                }

                // Hide select all checkbox if not admin
                if (!isAdmin) {
                    document.getElementById('selectAll').style.display = 'none';
                }

                SyncIndicator.hide();
            } catch (error) {
                SyncIndicator.hide();
                Toast.error('Failed to load filters');
            }
        }

        // Check if date is within approval window
        function isDateApprovable(dateStr) {
            const recordDate = new Date(dateStr);
            const today = new Date();
            
            // Get 1st of next month
            const nextMonth1st = new Date(today.getFullYear(), today.getMonth() + 1, 1);
            nextMonth1st.setHours(23, 59, 59, 999);
            
            return recordDate <= nextMonth1st;
        }

        // Generate report
        async function generateReport() {
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            const departmentId = document.getElementById('departmentFilter').value;
            const laborSearch = document.getElementById('laborFilter').value.trim();

            if (!fromDate || !toDate) {
                Toast.error('Please select date range');
                return;
            }

            if (new Date(fromDate) > new Date(toDate)) {
                Toast.error('From date cannot be after To date');
                return;
            }

            try {
                SyncIndicator.show('Generating report...');
                selectedIds.clear();
                updateBulkActions();

                const result = await ReportAPI.getDailyAttendance(fromDate, toDate, departmentId);

                if (!result.success) {
                    throw new Error(result.error);
                }

                reportData = result.data;

                // Filter by labor ID or Iqama search
                if (laborSearch) {
                    const search = laborSearch.toLowerCase();
                    reportData = reportData.filter(r => {
                        const labor = laborers.find(l => l.labor_id === r.labor_id);
                        const iqama = labor?.iqama_number || '';
                        return r.labor_id.toLowerCase().includes(search) || 
                               iqama.toLowerCase().includes(search);
                    });
                }

                // Filter by LOP status
                const lopFilter = document.getElementById('lopFilter').value;
                if (lopFilter === 'pending') {
                    reportData = reportData.filter(r => 
                        (r.auto_status === 'H' || r.auto_status === 'A') && !r.approved_by
                    );
                } else if (lopFilter === 'approved') {
                    reportData = reportData.filter(r => r.approved_by);
                }

                // Calculate summary
                const presentCount = reportData.filter(r => r.final_status === 'P').length;
                const halfDayCount = reportData.filter(r => r.final_status === 'H').length;
                const absentCount = reportData.filter(r => r.final_status === 'A').length;
                const totalHours = reportData.reduce((sum, r) => sum + (parseFloat(r.total_hours) || 0), 0);
                const avgHours = reportData.length > 0 ? (totalHours / reportData.length).toFixed(1) : 0;

                // Update summary
                document.getElementById('totalRecords').textContent = reportData.length;
                document.getElementById('presentCount').textContent = presentCount;
                document.getElementById('halfDayCount').textContent = halfDayCount;
                document.getElementById('absentCount').textContent = absentCount;
                document.getElementById('avgHours').textContent = avgHours;
                document.getElementById('summarySection').style.display = 'grid';

                // Render table
                renderTable();

                SyncIndicator.hide();
                Toast.success(`Found ${reportData.length} records`);

            } catch (error) {
                SyncIndicator.hide();
                Toast.error('Failed to generate report: ' + error.message);
            }
        }

        // Render table
        function renderTable() {
            const tbody = document.getElementById('reportTable');

            if (reportData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="12" class="text-center p-20 text-muted">
                            No records found for selected criteria
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = reportData.map(record => {
                const labor = laborers.find(l => l.labor_id === record.labor_id);
                const laborName = labor?.name || record.laborers?.name || 'Unknown';
                const deptName = labor?.departments?.name || '-';
                
                const autoStatusClass = `status-${record.auto_status}`;
                const autoStatusText = record.auto_status === 'P' ? 'P' : 
                                       record.auto_status === 'H' ? 'H' : 'A';

                const finalStatusClass = `status-${record.final_status}`;
                const finalStatusText = record.final_status === 'P' ? 'P' : 
                                        record.final_status === 'H' ? 'H' : 'A';

                const canApprove = (record.auto_status === 'H' || record.auto_status === 'A') && 
                                   !record.approved_by && 
                                   isDateApprovable(record.date);
                
                const wasApproved = record.approved_by && record.final_status === 'P';
                const isFrozen = !isDateApprovable(record.date);
                
                // Checkbox logic: only show for approvable records, admin only for bulk
                let checkboxHtml = '';
                if (isAdmin && canApprove) {
                    const isChecked = selectedIds.has(record.id) ? 'checked' : '';
                    checkboxHtml = `<input type="checkbox" class="lop-checkbox" data-id="${record.id}" ${isChecked} onchange="toggleSelect('${record.id}')">`;
                } else {
                    checkboxHtml = `<input type="checkbox" class="lop-checkbox" disabled>`;
                }

                // LOP Action column
                let lopActionHtml = '';
                if (wasApproved) {
                    // Show approval info + reason button + undo (admin only)
                    lopActionHtml = `
                        <div class="lop-inline">
                            <span class="badge status-P">${record.auto_status} → P</span>
                            <button class="reason-btn" onclick="viewReason('${record.id}')" title="View reason">💬</button>
                            <span style="font-size: 11px; color: #38a169; white-space: nowrap;">by ${record.approved_by}</span>
                            ${isAdmin && !isFrozen ? `<button class="undo-btn" onclick="undoApproval('${record.id}')">↩ Undo</button>` : ''}
                        </div>
                    `;
                } else if (canApprove) {
                    lopActionHtml = `<button class="approve-btn" onclick="openApproveModal('${record.id}')">✓ Approve</button>`;
                } else if (isFrozen && (record.auto_status === 'H' || record.auto_status === 'A')) {
                    lopActionHtml = `<span class="frozen-badge">🔒 Frozen</span>`;
                } else {
                    lopActionHtml = '-';
                }

                return `
                    <tr>
                        <td>${checkboxHtml}</td>
                        <td>${DateUtils.formatDate(record.date)}</td>
                        <td><strong>${record.labor_id}</strong></td>
                        <td>${laborName}</td>
                        <td>${deptName}</td>
                        <td>${DateUtils.formatTimeShort(record.first_login) || '-'}</td>
                        <td>${DateUtils.formatTimeShort(record.last_logout) || '-'}</td>
                        <td>${record.total_hours ? parseFloat(record.total_hours).toFixed(1) + 'h' : '-'}</td>
                        <td><span class="badge ${autoStatusClass}">${autoStatusText}</span></td>
                        <td><span class="badge ${finalStatusClass}">${finalStatusText}</span></td>
                        <td>${lopActionHtml}</td>
                        <td>
                            <button class="photo-btn" onclick="viewPhotos('${record.labor_id}', '${record.date}')">
                                📷 View
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');

            updateSelectAllState();
        }

        // ============ SELECTION FUNCTIONS ============

        function toggleSelect(id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            updateBulkActions();
            updateSelectAllState();
        }

        function toggleSelectAll() {
            const selectAllCheckbox = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.lop-checkbox[data-id]');
            
            if (selectAllCheckbox.checked) {
                checkboxes.forEach(cb => {
                    cb.checked = true;
                    selectedIds.add(cb.dataset.id);
                });
            } else {
                checkboxes.forEach(cb => {
                    cb.checked = false;
                    selectedIds.delete(cb.dataset.id);
                });
            }
            updateBulkActions();
        }

        function updateSelectAllState() {
            const selectAllCheckbox = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.lop-checkbox[data-id]');
            const checkedCount = document.querySelectorAll('.lop-checkbox[data-id]:checked').length;
            
            if (checkboxes.length === 0) {
                selectAllCheckbox.checked = false;
                selectAllCheckbox.indeterminate = false;
            } else if (checkedCount === 0) {
                selectAllCheckbox.checked = false;
                selectAllCheckbox.indeterminate = false;
            } else if (checkedCount === checkboxes.length) {
                selectAllCheckbox.checked = true;
                selectAllCheckbox.indeterminate = false;
            } else {
                selectAllCheckbox.checked = false;
                selectAllCheckbox.indeterminate = true;
            }
        }

        function updateBulkActions() {
            const bulkActions = document.getElementById('bulkActions');
            const selectedCount = document.getElementById('selectedCount');
            
            if (selectedIds.size > 0 && isAdmin) {
                bulkActions.classList.add('active');
                selectedCount.textContent = selectedIds.size;
            } else {
                bulkActions.classList.remove('active');
            }
        }

        function clearSelection() {
            selectedIds.clear();
            document.querySelectorAll('.lop-checkbox[data-id]').forEach(cb => cb.checked = false);
            document.getElementById('selectAll').checked = false;
            updateBulkActions();
        }

        // ============ APPROVE FUNCTIONS ============

        function openApproveModal(recordId) {
            pendingApproveId = recordId;
            pendingBulkApprove = false;
            
            const record = reportData.find(r => r.id === recordId);
            const labor = laborers.find(l => l.labor_id === record.labor_id);
            
            document.getElementById('approveModalTitle').textContent = 'Approve LOP';
            document.getElementById('approveInfo').innerHTML = `
                <div><strong>Labor:</strong> ${labor?.name || record.labor_id} (${record.labor_id})</div>
                <div><strong>Date:</strong> ${DateUtils.formatDate(record.date)}</div>
                <div><strong>Status:</strong> ${record.auto_status} → P</div>
            `;
            document.getElementById('approveReason').value = '';
            document.getElementById('approveModal').classList.add('active');
        }

        function openBulkApproveModal() {
            if (selectedIds.size === 0) {
                Toast.error('No records selected');
                return;
            }

            pendingApproveId = null;
            pendingBulkApprove = true;
            
            document.getElementById('approveModalTitle').textContent = 'Bulk Approve LOP';
            document.getElementById('approveInfo').innerHTML = `
                <div><strong>Selected Records:</strong> ${selectedIds.size}</div>
                <div style="color: #718096; font-size: 13px; margin-top: 5px;">All selected Half Day / Absent records will be marked as Present</div>
            `;
            document.getElementById('approveReason').value = '';
            document.getElementById('approveModal').classList.add('active');
        }

        function closeApproveModal() {
            document.getElementById('approveModal').classList.remove('active');
            pendingApproveId = null;
            pendingBulkApprove = false;
        }

        async function confirmApprove() {
            const reason = document.getElementById('approveReason').value.trim();
            
            if (!reason) {
                Toast.error('Reason is mandatory');
                return;
            }

            try {
                SyncIndicator.show('Approving...');

                if (pendingBulkApprove) {
                    // Bulk approve
                    const result = await ReportAPI.bulkApproveLOP(Array.from(selectedIds), reason);
                    
                    if (!result.success) {
                        throw new Error(result.error);
                    }

                    Toast.success(`Approved ${result.approvedCount} records${result.skippedCount > 0 ? `, skipped ${result.skippedCount}` : ''}`);
                    clearSelection();
                } else {
                    // Single approve
                    const result = await ReportAPI.approveLOP(pendingApproveId, reason);
                    
                    if (!result.success) {
                        throw new Error(result.error);
                    }

                    Toast.success('LOP approved successfully');
                }

                closeApproveModal();
                await generateReport(); // Refresh data

            } catch (error) {
                SyncIndicator.hide();
                Toast.error('Failed to approve: ' + error.message);
            }
        }

        async function undoApproval(recordId) {
            if (!confirm('Are you sure you want to undo this approval?')) {
                return;
            }

            try {
                SyncIndicator.show('Undoing...');
                
                const result = await ReportAPI.undoLOP(recordId);
                
                if (!result.success) {
                    throw new Error(result.error);
                }

                Toast.success('Approval undone');
                await generateReport(); // Refresh data

            } catch (error) {
                SyncIndicator.hide();
                Toast.error('Failed to undo: ' + error.message);
            }
        }

        // ============ VIEW REASON ============

        function viewReason(recordId) {
            const record = reportData.find(r => r.id === recordId);
            const labor = laborers.find(l => l.labor_id === record.labor_id);
            
            document.getElementById('reasonModalBody').innerHTML = `
                <div style="margin-bottom: 15px;">
                    <div style="color: #666; font-size: 12px;">Labor</div>
                    <div style="font-weight: 600;">${labor?.name || record.labor_id} (${record.labor_id})</div>
                </div>
                <div style="margin-bottom: 15px;">
                    <div style="color: #666; font-size: 12px;">Date</div>
                    <div style="font-weight: 600;">${DateUtils.formatDate(record.date)}</div>
                </div>
                <div style="margin-bottom: 15px;">
                    <div style="color: #666; font-size: 12px;">Status Change</div>
                    <div><span class="badge status-${record.auto_status}">${record.auto_status}</span> → <span class="badge status-P">P</span></div>
                </div>
                <div style="margin-bottom: 15px;">
                    <div style="color: #666; font-size: 12px;">Approved By</div>
                    <div style="font-weight: 600;">${record.approved_by}</div>
                </div>
                <div style="margin-bottom: 15px;">
                    <div style="color: #666; font-size: 12px;">Approved At</div>
                    <div>${record.approved_at ? new Date(record.approved_at).toLocaleString() : '-'}</div>
                </div>
                <div style="background: #f7fafc; padding: 15px; border-radius: 8px;">
                    <div style="color: #666; font-size: 12px; margin-bottom: 5px;">Reason</div>
                    <div>${record.lop_reason || '-'}</div>
                </div>
            `;
            document.getElementById('reasonModal').classList.add('active');
        }

        function closeReasonModal() {
            document.getElementById('reasonModal').classList.remove('active');
        }

        // ============ PHOTO MODAL ============

        async function viewPhotos(laborId, date) {
            try {
                SyncIndicator.show('Loading photos...');

                const result = await ReportAPI.getPunchPhotos(laborId, date);

                if (!result.success) {
                    throw new Error(result.error);
                }

                const photos = result.data;
                const labor = laborers.find(l => l.labor_id === laborId);

                document.getElementById('photoModalTitle').textContent = 
                    `${labor?.name || laborId} - ${DateUtils.formatDate(date)}`;

                if (photos.length === 0) {
                    document.getElementById('photoModalBody').innerHTML = `
                        <div class="text-center p-20 text-muted">
                            <div style="font-size: 48px; margin-bottom: 15px;">📷</div>
                            <p>No punch photos available for this date</p>
                        </div>
                    `;
                } else {
                    document.getElementById('photoModalBody').innerHTML = photos.map(punch => `
                        <div style="display: flex; gap: 20px; align-items: center; padding: 15px; border-bottom: 1px solid #e0e0e0;">
                            <div style="flex-shrink: 0;">
                                ${punch.photo_url ? 
                                    `<img src="${punch.photo_url}" alt="Punch photo" 
                                         style="width: 120px; height: 90px; object-fit: cover; border-radius: 8px; cursor: pointer;"
                                         onclick="window.open('${punch.photo_url}', '_blank')">` :
                                    `<div style="width: 120px; height: 90px; background: #e2e8f0; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999;">No Photo</div>`
                                }
                            </div>
                            <div>
                                <div style="font-weight: 600; font-size: 16px; margin-bottom: 5px;">
                                    🕐 Punch
                                </div>
                                <div style="color: #666; font-size: 14px;">
                                    Time: ${DateUtils.formatTime(punch.time)}
                                </div>
                                <div style="color: #666; font-size: 14px;">
                                    Location: ${punch.location_name || '-'}
                                </div>
                                <div style="color: #666; font-size: 14px;">
                                    Confidence: ${punch.confidence || '-'}%
                                </div>
                            </div>
                        </div>
                    `).join('');
                }

                document.getElementById('photoModal').classList.add('active');
                SyncIndicator.hide();

            } catch (error) {
                SyncIndicator.hide();
                Toast.error('Failed to load photos: ' + error.message);
            }
        }

        function closePhotoModal() {
            document.getElementById('photoModal').classList.remove('active');
        }

        // ============ EXPORT CSV ============

        function exportCSV() {
            if (reportData.length === 0) {
                Toast.error('No data to export. Generate report first.');
                return;
            }

            const data = reportData.map(record => {
                const labor = laborers.find(l => l.labor_id === record.labor_id);
                return {
                    'Date': DateUtils.formatDate(record.date),
                    'Labor ID': record.labor_id,
                    'Name': labor?.name || 'Unknown',
                    'Iqama': labor?.iqama_number || '-',
                    'Department': labor?.departments?.name || '-',
                    'Login': DateUtils.formatTimeShort(record.first_login) || '-',
                    'Logout': DateUtils.formatTimeShort(record.last_logout) || '-',
                    'Hours': record.total_hours ? parseFloat(record.total_hours).toFixed(1) : '0',
                    'Auto Status': record.auto_status,
                    'Final Status': record.final_status,
                    'Approved By': record.approved_by || '-',
                    'LOP Reason': record.lop_reason || '-'
                };
            });

            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            
            CSVHandler.exportToCSV(data, `attendance_report_${fromDate}_to_${toDate}`);
            Toast.success('CSV exported!');
        }

        // Initialize
        setDefaultDates();
        loadFilters();
    </script>
</body>
</html>
