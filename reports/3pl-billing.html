<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Attendance - 3PL Billing Report</title>
    <link rel="stylesheet" href="../css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <style>
        .filters-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .billing-table-container {
            overflow-x: auto;
            margin-top: 20px;
            max-height: 70vh;
        }
        .billing-table {
            border-collapse: collapse;
            font-size: 11px;
            min-width: 100%;
        }
        .billing-table th, .billing-table td {
            border: 1px solid #d0d0d0;
            padding: 4px 3px;
            text-align: center;
            white-space: nowrap;
        }
        .billing-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .billing-table th.day-group {
            min-width: 90px;
        }
        .billing-table th.sub-header {
            background: #5a67d8;
            font-size: 10px;
            font-weight: 500;
        }
        .billing-table td.labor-id {
            font-weight: 600;
            background: #f7fafc;
            text-align: left;
            position: sticky;
            left: 0;
            z-index: 1;
        }
        .billing-table td.name-cell {
            text-align: left;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .billing-table td.time-cell {
            font-size: 10px;
            color: #4a5568;
        }
        /* Status colors */
        .billing-table td.status-P {
            background: #c6f6d5;
            color: #22543d;
            font-weight: 600;
        }
        .billing-table td.status-H {
            background: #fed7aa;
            color: #c05621;
            font-weight: 600;
        }
        .billing-table td.status-A {
            background: #fed7d7;
            color: #c53030;
            font-weight: 600;
        }
        .billing-table td.status-F {
            background: #e2e8f0;
            color: #718096;
            font-weight: 600;
        }
        .billing-table td.total-cell {
            background: #edf2f7;
            font-weight: 600;
        }
        .billing-table td.paid-cell {
            background: #c6f6d5;
            font-weight: 700;
            color: #22543d;
        }
        .billing-table tr:hover td:not(.labor-id) {
            opacity: 0.9;
        }
        .summary-row td {
            background: #667eea !important;
            color: white !important;
            font-weight: 600;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .legend-color {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 11px;
        }
        /* Day cell with 3 rows */
        .day-cell {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .day-cell .time-in, .day-cell .time-out {
            font-size: 9px;
            color: #666;
        }
        .day-cell .status {
            font-weight: 600;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="header">
            <h1>📋 3PL Monthly Billing Report</h1>
            <div class="header-actions">
                <button type="button" class="btn btn-secondary" onclick="location.href='../dashboard.html'">← Dashboard</button>
            </div>
        </div>

        <div class="content">
            <!-- Filters -->
            <div class="filters-card">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Year</label>
                        <select id="yearSelect" class="form-control">
                            <!-- Years will be populated -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Month</label>
                        <select id="monthSelect" class="form-control">
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <select id="departmentFilter" class="form-control">
                            <option value="">All Departments</option>
                        </select>
                    </div>
                </div>
                <div class="action-buttons" style="margin-top: 15px;">
                    <button type="button" class="btn btn-primary" onclick="generateReport()">📊 Generate Report</button>
                    <button type="button" class="btn btn-success" onclick="exportExcel()">📥 Export Excel</button>
                    <button type="button" class="btn btn-secondary" onclick="printReport()">🖨️ Print</button>
                </div>
            </div>

            <!-- Legend -->
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #c6f6d5; color: #22543d;">P</div>
                    <span>Present</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #fed7aa; color: #c05621;">H</div>
                    <span>Half Day</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #fed7d7; color: #c53030;">A</div>
                    <span>Absent</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e2e8f0; color: #718096;">F</div>
                    <span>Friday (Holiday)</span>
                </div>
            </div>

            <!-- Report Table -->
            <div class="billing-table-container" id="reportContainer">
                <div class="text-center p-20 text-muted">
                    Select year, month and click "Generate Report"
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- App Scripts -->
    <script src="../js/config/supabase.js"></script>
    <script src="../js/auth/auth.js"></script>
    <script src="../js/utils/date-utils.js"></script>
    <script src="../js/ui/sync-indicator.js"></script>
    <script src="../js/ui/toast.js"></script>
    <script src="../js/api/department-api.js"></script>
    <script src="../js/api/report-api.js"></script>

    <script>
        // Require login
        if (!AUTH.requireLogin()) {
            window.location.href = '../index.html';
        }

        const session = AUTH.getSession();
        let departments = [];
        let reportData = [];
        let reportMeta = {};

        // Get ordinal suffix for day
        function getOrdinal(n) {
            const s = ['th', 'st', 'nd', 'rd'];
            const v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        // Get month name
        function getMonthName(month) {
            const months = ['', 'January', 'February', 'March', 'April', 'May', 'June', 
                           'July', 'August', 'September', 'October', 'November', 'December'];
            return months[month];
        }

        // Initialize year dropdown
        function initYearDropdown() {
            const yearSelect = document.getElementById('yearSelect');
            const currentYear = new Date().getFullYear();
            
            for (let year = currentYear; year >= currentYear - 2; year--) {
                yearSelect.innerHTML += `<option value="${year}">${year}</option>`;
            }
        }

        // Set current month
        function setCurrentMonth() {
            const currentMonth = new Date().getMonth() + 1;
            document.getElementById('monthSelect').value = currentMonth;
        }

        // Load departments
        async function loadDepartments() {
            try {
                const result = await DepartmentAPI.getActive();
                if (result.success) {
                    departments = result.data;
                    const select = document.getElementById('departmentFilter');
                    select.innerHTML = '<option value="">All Departments</option>';
                    
                    departments.forEach(dept => {
                        if (session.role === 'admin' || dept.id === session.departmentId) {
                            select.innerHTML += `<option value="${dept.id}">${dept.name}</option>`;
                        }
                    });
                }
            } catch (error) {
                Toast.error('Failed to load departments');
            }
        }

        // Generate report
        async function generateReport() {
            const year = parseInt(document.getElementById('yearSelect').value);
            const month = parseInt(document.getElementById('monthSelect').value);
            const departmentId = document.getElementById('departmentFilter').value;

            try {
                SyncIndicator.show('Generating billing report...');

                const result = await ReportAPI.getMonthlyBilling(year, month, departmentId);

                if (!result.success) {
                    throw new Error(result.error);
                }

                reportData = result.data;
                reportMeta = result.meta;

                renderTable();

                SyncIndicator.hide();
                Toast.success(`Report generated for ${reportData.length} laborers`);

            } catch (error) {
                SyncIndicator.hide();
                Toast.error('Failed to generate report: ' + error.message);
            }
        }

        // Render table
        function renderTable() {
            const container = document.getElementById('reportContainer');

            if (reportData.length === 0) {
                container.innerHTML = `
                    <div class="text-center p-20 text-muted">
                        No data found for selected period
                    </div>
                `;
                return;
            }

            const totalDays = reportMeta.totalDays;
            const monthName = getMonthName(reportMeta.month);

            // Build header row 1 (day groups)
            let headerRow1 = `
                <tr>
                    <th rowspan="2">Sr</th>
                    <th rowspan="2">Labor ID</th>
                    <th rowspan="2">Iqama</th>
                    <th rowspan="2">Name</th>
                    <th rowspan="2">DOJ</th>
            `;

            for (let day = 1; day <= totalDays; day++) {
                headerRow1 += `<th colspan="3" class="day-group">${getOrdinal(day)} ${monthName}</th>`;
            }

            headerRow1 += `
                    <th rowspan="2">Work Days</th>
                    <th rowspan="2">Half Days</th>
                    <th rowspan="2">Absent</th>
                    <th rowspan="2">Fridays</th>
                    <th rowspan="2">Total Paid</th>
                </tr>
            `;

            // Build header row 2 (In/Out/Status sub-headers)
            let headerRow2 = '<tr>';
            for (let day = 1; day <= totalDays; day++) {
                headerRow2 += `
                    <th class="sub-header">In</th>
                    <th class="sub-header">Out</th>
                    <th class="sub-header">Status</th>
                `;
            }
            headerRow2 += '</tr>';

            // Build body
            let bodyHtml = '';
            let totalPresent = 0;
            let totalHalfDay = 0;
            let totalAbsent = 0;
            let totalFridays = 0;
            let grandTotalPaid = 0;

            reportData.forEach((labor, index) => {
                bodyHtml += `
                    <tr>
                        <td>${index + 1}</td>
                        <td class="labor-id">${labor.laborId}</td>
                        <td>${labor.iqamaNumber}</td>
                        <td class="name-cell" title="${labor.name}">${labor.name}</td>
                        <td>${DateUtils.formatDate(labor.dateOfJoining)}</td>
                `;

                for (let day = 1; day <= totalDays; day++) {
                    const dayData = labor.days[day] || { status: 'A', in: '', out: '' };
                    const status = dayData.status;
                    let statusClass = '';
                    
                    if (status === 'P') statusClass = 'status-P';
                    else if (status === 'H') statusClass = 'status-H';
                    else if (status === 'A') statusClass = 'status-A';
                    else if (status === 'F') statusClass = 'status-F';

                    bodyHtml += `
                        <td class="time-cell">${dayData.in || '-'}</td>
                        <td class="time-cell">${dayData.out || '-'}</td>
                        <td class="${statusClass}">${status}</td>
                    `;
                }

                bodyHtml += `
                        <td class="total-cell">${labor.presentCount}</td>
                        <td class="total-cell">${labor.halfDayCount}</td>
                        <td class="total-cell">${labor.absentCount}</td>
                        <td class="total-cell">${labor.fridayCount}</td>
                        <td class="paid-cell">${labor.totalPaidDays}</td>
                    </tr>
                `;

                totalPresent += labor.presentCount;
                totalHalfDay += labor.halfDayCount;
                totalAbsent += labor.absentCount;
                totalFridays += labor.fridayCount;
                grandTotalPaid += labor.totalPaidDays;
            });

            // Summary row
            bodyHtml += `
                <tr class="summary-row">
                    <td colspan="5"><strong>GRAND TOTAL</strong></td>
            `;

            for (let day = 1; day <= totalDays; day++) {
                bodyHtml += `<td></td><td></td><td></td>`;
            }

            bodyHtml += `
                    <td>${totalPresent}</td>
                    <td>${totalHalfDay}</td>
                    <td>${totalAbsent}</td>
                    <td>${totalFridays}</td>
                    <td>${grandTotalPaid}</td>
                </tr>
            `;

            container.innerHTML = `
                <table class="billing-table">
                    <thead>${headerRow1}${headerRow2}</thead>
                    <tbody>${bodyHtml}</tbody>
                </table>
            `;
        }

        /// Export Excel (XLSX format with ExcelJS)
        async function exportExcel() {
            if (reportData.length === 0) {
                Toast.error('No data to export. Generate report first.');
                return;
            }

            try {
                SyncIndicator.show('Generating Excel...');

                const totalDays = reportMeta.totalDays;
                const monthName = getMonthName(reportMeta.month);

                // Create workbook and worksheet
                const workbook = new ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet('3PL Billing');

                // Define colors
                const colors = {
                    P: { bg: 'C6F6D5', font: '22543D' },  // Green
                    H: { bg: 'FEFCBF', font: '975A16' },  // Yellow
                    A: { bg: 'FED7D7', font: 'C53030' },  // Red
                    F: { bg: 'E2E8F0', font: '718096' },  // Grey
                    header: { bg: '667EEA', font: 'FFFFFF' },
                    subHeader: { bg: '5A67D8', font: 'FFFFFF' },
                    totalCell: { bg: 'EDF2F7', font: '000000' },
                    paidCell: { bg: 'C6F6D5', font: '22543D' }
                };

                // Build header row 1 (day groups)
                let headerRow1 = ['', '', '', '', ''];
                for (let day = 1; day <= totalDays; day++) {
                    headerRow1.push(`${getOrdinal(day)} ${monthName}`, '', '');
                }
                headerRow1.push('Work Days', 'Half Days', 'Absent', 'Fridays', 'Total Paid');

                // Build header row 2 (sub-headers)
                let headerRow2 = ['Sr', 'Labor ID', 'Iqama', 'Name', 'DOJ'];
                for (let day = 1; day <= totalDays; day++) {
                    headerRow2.push('In', 'Out', 'Status');
                }
                headerRow2.push('', '', '', '', '');

                // Add header rows
                const row1 = worksheet.addRow(headerRow1);
                const row2 = worksheet.addRow(headerRow2);

                // Style header row 1
                row1.eachCell((cell, colNumber) => {
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: colors.header.bg } };
                    cell.font = { bold: true, color: { argb: colors.header.font } };
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                });

                // Style header row 2
                row2.eachCell((cell, colNumber) => {
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: colors.subHeader.bg } };
                    cell.font = { bold: true, color: { argb: colors.subHeader.font }, size: 9 };
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                });

                // Merge header cells for day groups
                for (let day = 1; day <= totalDays; day++) {
                    const startCol = 6 + (day - 1) * 3;
                    worksheet.mergeCells(1, startCol, 1, startCol + 2);
                }
                // Merge first 5 columns in row 1
                worksheet.mergeCells(1, 1, 1, 5);

                // Add data rows
                reportData.forEach((labor, index) => {
                    let rowData = [
                        index + 1,
                        labor.laborId,
                        labor.iqamaNumber,
                        labor.name,
                        DateUtils.formatDate(labor.dateOfJoining)
                    ];

                    for (let day = 1; day <= totalDays; day++) {
                        const dayData = labor.days[day] || { status: 'A', in: '', out: '' };
                        rowData.push(dayData.in || '', dayData.out || '', dayData.status);
                    }

                    rowData.push(labor.presentCount, labor.halfDayCount, labor.absentCount, labor.fridayCount, labor.totalPaidDays);

                    const dataRow = worksheet.addRow(rowData);

                    // Style data cells
                    dataRow.eachCell((cell, colNumber) => {
                        cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                        cell.alignment = { horizontal: 'center', vertical: 'middle' };

                        // Iqama column (3) - format as text
                        if (colNumber === 3) {
                            cell.numFmt = '@';
                        }

                        // Status columns - apply colors
                        if (colNumber > 5 && colNumber <= 5 + totalDays * 3) {
                            const colInDay = (colNumber - 6) % 3;
                            if (colInDay === 2) {
                                // Status column
                                const status = cell.value;
                                if (colors[status]) {
                                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: colors[status].bg } };
                                    cell.font = { bold: true, color: { argb: colors[status].font } };
                                }
                            }
                        }

                        // Summary columns (last 5)
                        const summaryStart = 6 + totalDays * 3;
                        if (colNumber >= summaryStart && colNumber < summaryStart + 4) {
                            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: colors.totalCell.bg } };
                            cell.font = { bold: true };
                        }

                        // Total Paid column (last column)
                        if (colNumber === summaryStart + 4) {
                            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: colors.paidCell.bg } };
                            cell.font = { bold: true, color: { argb: colors.paidCell.font } };
                        }
                    });
                });

                // Set column widths
                worksheet.getColumn(1).width = 5;   // Sr
                worksheet.getColumn(2).width = 10;  // Labor ID
                worksheet.getColumn(3).width = 15;  // Iqama
                worksheet.getColumn(4).width = 18;  // Name
                worksheet.getColumn(5).width = 12;  // DOJ

                for (let day = 1; day <= totalDays; day++) {
                    const startCol = 6 + (day - 1) * 3;
                    worksheet.getColumn(startCol).width = 10;     // In
                    worksheet.getColumn(startCol + 1).width = 10; // Out
                    worksheet.getColumn(startCol + 2).width = 6;  // Status
                }

                const summaryStart = 6 + totalDays * 3;
                worksheet.getColumn(summaryStart).width = 10;     // Work Days
                worksheet.getColumn(summaryStart + 1).width = 10; // Half Days
                worksheet.getColumn(summaryStart + 2).width = 8;  // Absent
                worksheet.getColumn(summaryStart + 3).width = 8;  // Fridays
                worksheet.getColumn(summaryStart + 4).width = 10; // Total Paid

                // Freeze first 2 rows and first 5 columns
                worksheet.views = [{ state: 'frozen', xSplit: 5, ySplit: 2 }];

                // Generate file
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `3PL_Billing_${reportMeta.year}_${String(reportMeta.month).padStart(2, '0')}.xlsx`;
                a.click();
                URL.revokeObjectURL(url);

                SyncIndicator.hide();
                Toast.success('Excel exported!');

            } catch (error) {
                SyncIndicator.hide();
                Toast.error('Export failed: ' + error.message);
                console.error('Excel export error:', error);
            }
        }

        // Print report
        function printReport() {
            if (reportData.length === 0) {
                Toast.error('No data to print. Generate report first.');
                return;
            }

            const printContent = document.getElementById('reportContainer').innerHTML;
            const printWindow = window.open('', '_blank');
            
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>3PL Billing Report</title>
                    <style>
                        body { font-family: Arial, sans-serif; font-size: 8px; }
                        table { border-collapse: collapse; width: 100%; }
                        th, td { border: 1px solid #333; padding: 2px; text-align: center; }
                        th { background: #667eea; color: white; font-size: 7px; }
                        .sub-header { background: #5a67d8; }
                        .status-P { background: #c6f6d5; }
                        .status-H { background: #fed7aa; }
                        .status-A { background: #fed7d7; }
                        .status-F { background: #e2e8f0; }
                        .total-cell { background: #edf2f7; font-weight: bold; }
                        .paid-cell { background: #c6f6d5; font-weight: bold; }
                        .summary-row td { background: #667eea !important; color: white !important; }
                        .labor-id, .name-cell { text-align: left; }
                        .time-cell { font-size: 7px; }
                        @media print {
                            @page { size: landscape; margin: 0.3cm; }
                        }
                    </style>
                </head>
                <body>
                    <h2 style="text-align: center; font-size: 12px;">3PL Monthly Billing Report - ${getMonthName(reportMeta.month)} ${reportMeta.year}</h2>
                    ${printContent}
                </body>
                </html>
            `);
            
            printWindow.document.close();
            printWindow.print();
        }

        // Initialize
        initYearDropdown();
        setCurrentMonth();
        loadDepartments();
    </script>
</body>
</html>
